<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Ordens de Serviço — Núcleo de Manutenção Predial</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --paper:#F4F2EC;
    --sheet:#FFFFFF;
    --ink:#1E2A38;
    --ink-soft:#5B6674;
    --line:#CFC7B4;
    --line-soft:#E4DFD3;
    --band:#DCE3E6;
    --accent:#8B2E2E;
    --accent-green:#2F5D50;
    --accent-green-bg:#E4EEEA;
    --accent-red-bg:#F3E3E1;
    --focus:#1E2A38;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  button{
    font-family:var(--sans);
    cursor:pointer;
  }
  input, textarea{ font-family:var(--sans); }
  ::selection{ background:#D8CDB3; }

  /* ---------- layout shells ---------- */
  .app{
    max-width:1000px;
    margin:0 auto;
    padding:40px 24px 80px;
  }
  .app-header{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:28px;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;
  }
  .app-header img.app-logo{
    height:38px;
    width:auto;
  }
  .app-header .titles{ flex:1; }
  .app-header h1{
    font-family:var(--serif);
    font-size:22px;
    margin:0;
    letter-spacing:0.2px;
  }
  .app-header .subtitle{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .badge-count{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }

  .hidden{ display:none !important; }

  /* ---------- upload screen ---------- */
  .card{
    background:var(--sheet);
    border:1px solid var(--line-soft);
    border-radius:2px;
  }
  .dropzone{
    border:1.5px dashed var(--line);
    border-radius:2px;
    padding:48px 24px;
    text-align:center;
    background:var(--sheet);
    transition:border-color .15s ease, background .15s ease;
  }
  .dropzone.drag{
    border-color:var(--ink);
    background:#FBFAF7;
  }
  .dropzone h2{
    font-family:var(--serif);
    font-size:18px;
    margin:0 0 6px;
  }
  .dropzone p{
    color:var(--ink-soft);
    font-size:13px;
    margin:0 0 20px;
  }
  .file-input-label{
    display:inline-block;
    padding:10px 22px;
    background:var(--ink);
    color:#fff;
    border-radius:2px;
    font-size:13px;
    font-weight:600;
    letter-spacing:.2px;
  }
  .file-input-label:hover{ background:#33455A; }
  #file-input{ display:none; }

  .divider-or{
    display:flex;
    align-items:center;
    gap:12px;
    margin:22px 0;
    color:var(--ink-soft);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
  }
  .divider-or::before, .divider-or::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line-soft);
  }

  .paste-area{
    padding:0 24px 24px;
  }
  .paste-area label{
    font-size:12px;
    color:var(--ink-soft);
    display:block;
    margin-bottom:8px;
  }
  textarea#paste-input{
    width:100%;
    min-height:110px;
    border:1px solid var(--line-soft);
    border-radius:2px;
    padding:10px 12px;
    font-family:var(--mono);
    font-size:11.5px;
    resize:vertical;
    color:var(--ink);
  }
  textarea#paste-input:focus{ outline:2px solid var(--focus); outline-offset:1px; }
  .btn-row{ display:flex; gap:10px; margin-top:12px; }
  .btn{
    border:1px solid var(--ink);
    background:var(--sheet);
    color:var(--ink);
    padding:9px 18px;
    border-radius:2px;
    font-size:12.5px;
    font-weight:600;
  }
  .btn:hover{ background:var(--ink); color:#fff; }
  .btn-primary{
    background:var(--ink);
    color:#fff;
  }
  .btn-primary:hover{ background:#33455A; }
  .btn:focus-visible, .file-input-label:focus-visible{ outline:2px solid var(--focus); outline-offset:2px; }
  .btn-ghost{
    border-color:transparent;
    color:var(--ink-soft);
  }
  .btn-ghost:hover{ background:var(--band); color:var(--ink); }

  .error-msg{
    background:var(--accent-red-bg);
    color:var(--accent);
    padding:10px 14px;
    border-radius:2px;
    font-size:12.5px;
    margin-top:14px;
  }

  /* ---------- review screen ---------- */
  .filter-bar{
    display:flex;
    align-items:flex-end;
    gap:18px;
    flex-wrap:wrap;
    padding:20px 24px;
    border-bottom:1px solid var(--line-soft);
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:5px;
  }
  .field label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.6px;
    color:var(--ink-soft);
  }
  .field input[type=date]{
    border:1px solid var(--line-soft);
    border-radius:2px;
    padding:7px 9px;
    font-size:13px;
    color:var(--ink);
  }
  .field input:focus{ outline:2px solid var(--focus); outline-offset:1px; }
  .count-pill{
    margin-left:auto;
    font-size:12px;
    color:var(--ink-soft);
    font-family:var(--mono);
  }

  table.chamados{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  table.chamados th{
    text-align:left;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.5px;
    color:var(--ink-soft);
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    background:#FAF9F5;
  }
  table.chamados td{
    padding:10px 12px;
    border-bottom:1px solid var(--line-soft);
    vertical-align:top;
  }
  table.chamados tr:hover td{ background:#FAF9F5; }
  table.chamados td.num{ font-family:var(--mono); font-size:12px; }
  .th-check, .td-check{ width:34px; }

  .empty-state{
    padding:60px 24px;
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
  }

  .review-actions{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 24px;
  }

  /* ---------- OS pages / print ---------- */
  .toolbar{
    position:sticky;
    top:0;
    z-index:10;
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--paper);
    padding:14px 0 18px;
    border-bottom:1px solid var(--line-soft);
    margin-bottom:24px;
  }
  .toolbar .spacer{ flex:1; }

  .os-nav{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:22px;
  }
  .os-nav a{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-soft);
    border:1px solid var(--line-soft);
    padding:4px 8px;
    border-radius:2px;
    text-decoration:none;
  }
  .os-nav a:hover{ border-color:var(--ink); color:var(--ink); }

  .os-page{
    background:var(--sheet);
    border:1px solid var(--line-soft);
    box-shadow:0 1px 3px rgba(30,42,56,0.08), 0 6px 18px rgba(30,42,56,0.06);
    border-radius:2px;
    padding:58px 62px 54px;
    margin:0 auto 44px;
    max-width:850px;
    page-break-after:always;
    break-inside:avoid;
  }
  .os-topline{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    border-bottom:2px solid var(--ink);
    padding-bottom:18px;
    margin-bottom:14px;
  }
  .os-brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .os-brand img.os-mark{
    height:65px;
    width:auto;
    flex-shrink:0;
  }
  .os-brand-text .org{ font-family:var(--serif); font-size:18px; font-weight:700; letter-spacing:.2px; }
  .os-brand-text .dept{ font-size:10.5px; color:var(--ink-soft); }
  .os-title-block{ text-align:right; }
  .os-title-block .doc-type{ font-family:var(--serif); font-size:13px; font-style:italic; color:var(--ink-soft); }
  .os-title-block .chamado-id{ font-family:var(--mono); font-size:15px; font-weight:700; margin-top:2px; }
  .os-title-block .no-os{ font-family:var(--mono); font-size:10.5px; color:var(--accent); margin-top:2px; }

  .os-band{
    background:var(--band);
    padding:12px 16px;
    font-size:13.5px;
    font-weight:600;
    margin:22px 0 26px;
    letter-spacing:.2px;
  }

  .os-meta{
    display:flex;
    gap:40px;
    font-size:12.5px;
    color:var(--ink-soft);
    margin-bottom:34px;
  }
  .os-meta b{ color:var(--ink); font-weight:600; }

  .os-section-title{
    font-family:var(--serif);
    font-size:15px;
    font-weight:700;
    margin:30px 0 16px;
    padding-bottom:7px;
    border-bottom:1px solid var(--line);
  }

  .os-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px 36px;
  }
  .os-item{
    font-size:15.5px;
    padding:10px 0;
    border-bottom:1px dotted var(--line-soft);
  }
  .os-item .lbl{
    display:block;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.5px;
    color:var(--ink-soft);
    margin-bottom:2px;
  }
  .os-item .val{ font-size:15px; }
  .os-item.full{ grid-column:1 / -1; }

  .diag-plain{ font-weight:700; }

  .os-desc-block{
    font-size:15.5px;
    line-height:1.8;
    background:#FAF9F5;
    border:1px solid var(--line-soft);
    padding:16px 18px;
    border-radius:2px;
    margin-top:6px;
    white-space:pre-wrap;
  }

  .os-footer{
    margin-top:48px;
    padding-top:26px;
    border-top:1px solid var(--line);
  }
  .os-footer-row{
    display:flex;
    gap:48px;
    font-size:13px;
    margin-bottom:22px;
  }
  .os-footer-row span{ color:var(--ink-soft); }
  .os-footer-row b{ font-weight:600; }

/* ---------- print rules ---------- */
@media print{

  body{
    background:#fff;
    color:#000;
  }

  .app-header,
  .toolbar,
  .os-nav,
  .no-print,
  #screen-upload,
  #screen-review{
    display:none !important;
  }

  .app{
    max-width:none;
    width:100%;
    padding:0;
    margin:0;
  }

  .os-page{
    border:none;
    margin:0;
    width:100%;
    max-width:none;
    box-shadow:none;
    border-radius:0;
    padding:22mm 24mm;
    page-break-after:always;
    break-inside:avoid;
  }

  .os-page:last-child{
    page-break-after:auto;
  }

  .os-topline{
    margin-bottom:16px;
    padding-bottom:14px;
  }

  .os-brand img.os-mark{
    height:45px;
  }

  .os-brand-text .org{
    font-size:15px;
  }

  .os-brand-text .dept{
    font-size:12px;
  }

  .os-title-block .doc-type{
    font-size:14px;
  }

  .os-title-block .chamado-id{
    font-size:16px;
  }

  .os-band{
    margin:18px 0 20px;
    padding:12px 15px;
    font-size:15.5px;
  }

  .os-meta{
    font-size:14px;
    margin-bottom:26px;
    gap:30px;
  }

  .os-section-title{
    font-size:15.5px;
    text-transform:uppercase;
    margin:24px 0 14px;
    padding-bottom:8px;
  }

  .os-grid{
    gap:12px 28px;
  }

  .os-item{
    font-size:14.5px;
    padding:9px 0;
  }

  .os-item .lbl{
    font-size:12px;
  }

  .os-item .val{
    font-size:13px;
  }

  .os-desc-block{
    font-size:16px;
    line-height:2.6;
    padding:18px 20px;
  }

  .os-footer{
    margin-top:32px;
    padding-top:20px;
  }

  .os-footer-row{
    font-size:14px;
    gap:30px;
  }

}

@page{
  size:A4;
  margin:0;
}
</style>
</head>
<body>

<div class="app">

  <div class="app-header">
    <img class="app-logo" src="images-removebg-preview.png" alt="ALECE">
    <div class="titles">
      <h1>Gerador de Ordens de Serviço</h1>
      <div class="subtitle">Núcleo de Manutenção Predial — Manutenção de Refrigeradores</div>
    </div>
    <div class="badge-count" id="header-status"></div>
  </div>

  <!-- ===================== SCREEN 1: UPLOAD ===================== -->
  <section id="screen-upload">
    <div class="card">
      <div class="dropzone" id="dropzone">
        <h2>Importe a planilha do formulário</h2>
        <p>Arraste o arquivo .xlsx / .csv exportado do Forms, ou clique para escolher</p>
        <label class="file-input-label" for="file-input">Escolher arquivo</label>
        <input type="file" id="file-input" accept=".xlsx,.xls,.csv">
      </div>

      <div class="divider-or">ou</div>

      <div class="paste-area">
        <label for="paste-input">Cole as linhas copiadas direto da planilha (com a linha de cabeçalho no início)</label>
        <textarea id="paste-input" placeholder="Carimbo de data/hora	Selecione sua equipe:	Nº do chamado:	..."></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-parse-paste">Processar dados colados</button>
          <button class="btn btn-ghost" id="btn-sample">Usar dados de exemplo</button>
        </div>
      </div>

      <div id="upload-error" class="error-msg hidden"></div>
    </div>
  </section>

  <!-- ===================== SCREEN 2: REVIEW / FILTER ===================== -->
  <section id="screen-review" class="hidden">
    <div class="card">
      <div class="filter-bar">
        <div class="field">
          <label for="date-from">De</label>
          <input type="date" id="date-from">
        </div>
        <div class="field">
          <label for="date-to">Até</label>
          <input type="date" id="date-to">
        </div>
        <button class="btn" id="btn-clear-dates">Limpar período</button>
        <div class="count-pill" id="filter-count"></div>
      </div>

      <div id="review-table-wrap"></div>

      <div class="review-actions">
        <button class="btn btn-ghost" id="btn-back-upload">← Nova importação</button>
        <button class="btn btn-primary" id="btn-generate">Gerar Ordens de Serviço</button>
      </div>
    </div>
  </section>

  <!-- ===================== SCREEN 3: OS PAGES ===================== -->
  <section id="screen-os" class="hidden">
    <div class="toolbar no-print">
      <button class="btn btn-ghost" id="btn-back-review">← Voltar à seleção</button>
      <div class="spacer"></div>
      <button class="btn btn-primary" id="btn-print-all">Imprimir / Salvar em PDF</button>
    </div>
    <div class="os-nav no-print" id="os-nav"></div>
    <div id="os-pages"></div>
  </section>

</div>

<script>
(function(){

  var LOGO_SRC = "images-removebg-preview.png";

  var FIELD_DEFS = [
    { key:'carimbo',        headers:['carimbo de data/hora'] },
    { key:'equipe',         headers:['selecione sua equipe:','selecione sua equipe'] },
    { key:'numeroChamado',  headers:['nº do chamado:','n° do chamado:','no do chamado:','nº do chamado','n° do chamado'] },
    { key:'outroChamado',   headers:['caso existam outros chamados para o mesmo local, descrever o número da ordem de serviço:','caso existam outros chamados para o mesmo local, descrever o número da ordem de serviço'] },
    { key:'anexo',          headers:['anexo:','anexo'] },
    { key:'localizacao',    headers:['localização:','localização'] },
    { key:'numGabinete',    headers:['nº do gabinete:','n° do gabinete:','nº do gabinete'] },
    { key:'sala',           headers:['sala:','sala'] },
    { key:'nomeSetor',      headers:['nome do setor:','nome do setor'] },
    { key:'salaSetor',      headers:['sala do setor:','sala do setor'] },
    { key:'marcaEvap',      headers:['marca da evaporadora:','marca da evaporadora'] },
    { key:'capacidade',     headers:['capacidade:','capacidade do equipamento:', 'capacidade da máquina evaporadora'] },
    { key:'tombo',          headers:['tombo: (placa alumínio/adesivo verde)','tombo (placa alumínio/adesivo verde)','tombo:'] },
    { key:'tag',            headers:['tag:  (adesivo branco com qr code)','tag: (adesivo branco com qr code)','tag:'] },
    { key:'solucionado',    headers:['problema solucionado?','problema solucionado'] },
    { key:'descProblema',   headers:['descreva o problema do chamado?','descreva o problema do chamado'] },
    { key:'pecaFaltando',   headers:['qual o problema ou peça que está faltando para solucionar o chamado?','qual o problema ou peça que está faltando para solucionar o chamado'] },
    { key:'aguaSanitaria',  headers:['foi colocado água sanitária na evaporadora e limpado os filtros?','foi colocado água sanitária na evaporadora e limpado os filtros'] }
  ];

  var SAMPLE_TSV =
"Carimbo de data/hora\tSelecione sua equipe:\tNº do chamado:\tCaso existam outros chamados para o mesmo local, descrever o número da ordem de serviço:\tAnexo:\tLocalização:\tNº do Gabinete:\tSala:\tNome do Setor:\tSala do Setor:\tMarca da Evaporadora:\tTombo: (PLACA ALUMÍNIO/ADESIVO VERDE)\tTag:  (ADESIVO BRANCO COM QR CODE)\tProblema solucionado?\tDescreva o problema do chamado?\tQual o problema ou peça que está faltando para solucionar o chamado?\tFoi colocado água sanitária na evaporadora e limpado os filtros?\n" +
"14/07/2026 09:19:38\tEquipe 6: José e Mateus\tChamado sem OS\tNão existe outro chamado\tAnexo 2\tSetor\t\t\t3 andar\tDutos\tHitachi\tSem tombo\tSem tombo\tSim\tAs duas correias estavam em péssimo estado uma ja quebrada.\t\tNão\n" +
"14/07/2026 16:07:29\tEquipe 5: Italo e Leandro\t2026070336\tNão existe outro chamado\tSede\tSetor\t\t\t1° secretaria\tRecepção\tMidea\t10952\t24556\tSim\tDreno solto\t\tNão\n" +
"14/07/2026 16:44:25\tEquipe 3: Marcílio e Janderson\t2026070325\tNão existe outro chamado\tAnexo 1\tSetor\t\t\tBanheiro feminino\tBanheiro feminino\tFujitsu\tOutros\tOutros\tSim\tCongelada\t\tNão\n" +
"15/07/2026 09:29:10\tEquipe 5: Italo e Leandro\t2026070343\tNão existe outro chamado\tAnexo 3\tSetor\t\t\tComitê de prevenção e combate a violência\tSala principal\tLG\t*****\t*****\tSim\tMáquina sem defeito\t\tNão\n" +
"15/07/2026 16:00:00\tEquipe 3: Marcílio e Janderson\t2026070349\t2026070348\tAnexo 1\tGabinete\t303\tSala dos Assessores\t\t\tMidea\t14294\t23392\tSim\tVazamento de gás\t\tNão\n";

  var state = { chamados: [] };

  function norm(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); }

  function val(v){
    if(v===undefined||v===null) return '—';
    var s=String(v).trim();
    if(s==='') return '—';
    if(/^\*+$/.test(s)) return 'Não informado';
    return s;
  }

  function parseBRDateTime(s){
    if(s instanceof Date) return s;
    s = String(s||'').trim();
    var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})[ T]?(\d{1,2})?:?(\d{1,2})?:?(\d{1,2})?/);
    if(!m) return null;
    var d=parseInt(m[1],10), mo=parseInt(m[2],10)-1, y=parseInt(m[3],10);
    if(y<100) y+=2000;
    var hh=m[4]?parseInt(m[4],10):0, mi=m[5]?parseInt(m[5],10):0, ss=m[6]?parseInt(m[6],10):0;
    var dt = new Date(y,mo,d,hh,mi,ss);
    return isNaN(dt.getTime()) ? null : dt;
  }

  function fmtDateTime(dt){
    if(!dt) return '—';
    function p(n){ return n<10?'0'+n:''+n; }
    return p(dt.getDate())+'/'+p(dt.getMonth()+1)+'/'+dt.getFullYear()+' '+p(dt.getHours())+':'+p(dt.getMinutes());
  }
  function fmtDateOnly(dt){
    if(!dt) return '—';
    function p(n){ return n<10?'0'+n:''+n; }
    return p(dt.getDate())+'/'+p(dt.getMonth()+1)+'/'+dt.getFullYear();
  }
  function fmtTimeOnly(dt){
    if(!dt) return '';
    function p(n){ return n<10?'0'+n:''+n; }
    return p(dt.getHours())+':'+p(dt.getMinutes());
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function buildColumnMap(headerRow){
    var map = {};
    var normalizedHeaders = headerRow.map(norm);
    FIELD_DEFS.forEach(function(def){
      var idx = -1;
      for(var i=0;i<normalizedHeaders.length;i++){
        if(def.headers.indexOf(normalizedHeaders[i]) !== -1){ idx = i; break; }
      }
      map[def.key] = idx;
    });
    return map;
  }

  function rowsToChamados(rows){
    if(!rows.length) return [];
    var headerRow = rows[0].map(function(c){ return c==null?'':c; });
    var colMap = buildColumnMap(headerRow);
    var out = [];
    for(var r=1;r<rows.length;r++){
      var row = rows[r];
      if(!row || row.every(function(c){ return c===undefined||c===null||String(c).trim()===''; })) continue;
      var o = {};
      FIELD_DEFS.forEach(function(def){
        var idx = colMap[def.key];
        o[def.key] = (idx>=0 && idx<row.length) ? row[idx] : '';
      });
      o._timestamp = parseBRDateTime(o.carimbo);
      out.push(o);
    }
    return out;
  }

  function parseTSVText(text){
    var lines = text.split(/\r\n|\r|\n/).filter(function(l){ return l.trim()!==''; });
    return lines.map(function(l){ return l.split('\t'); });
  }

  function showScreen(name){
    ['upload','review','os'].forEach(function(s){
      document.getElementById('screen-'+s).classList.toggle('hidden', s!==name);
    });
  }

  function setHeaderStatus(text){
    document.getElementById('header-status').textContent = text;
  }

  var dropzone = document.getElementById('dropzone');
  var fileInput = document.getElementById('file-input');
  var uploadError = document.getElementById('upload-error');

  function showUploadError(msg){
    uploadError.textContent = msg;
    uploadError.classList.remove('hidden');
  }
  function clearUploadError(){ uploadError.classList.add('hidden'); }

  dropzone.addEventListener('click', function(e){
    if(e.target.tagName !== 'LABEL') fileInput.click();
  });
  ['dragenter','dragover'].forEach(function(evt){
    dropzone.addEventListener(evt, function(e){ e.preventDefault(); dropzone.classList.add('drag'); });
  });
  ['dragleave','drop'].forEach(function(evt){
    dropzone.addEventListener(evt, function(e){ e.preventDefault(); dropzone.classList.remove('drag'); });
  });
  dropzone.addEventListener('drop', function(e){
    e.preventDefault();
    if(e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', function(e){
    if(e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
  });

  function handleFile(file){
    clearUploadError();
    var isCsv = /\.csv$/i.test(file.name);
    var reader = new FileReader();
    reader.onerror = function(){ showUploadError('Não foi possível ler o arquivo. Tente novamente.'); };
    reader.onload = function(e){
      try{
        var wb;
        if(isCsv){
          wb = XLSX.read(e.target.result, { type:'string', cellDates:true });
        } else {
          wb = XLSX.read(e.target.result, { type:'array', cellDates:true });
        }
        var sheet = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(sheet, { header:1, raw:true, defval:'' });
        processRows(rows);
      }catch(err){
        showUploadError('Não consegui interpretar essa planilha. Confira se é um .xlsx/.csv válido, ou use a opção de colar os dados.');
      }
    };
    if(isCsv) reader.readAsText(file, 'UTF-8');
    else reader.readAsArrayBuffer(file);
  }

  document.getElementById('btn-parse-paste').addEventListener('click', function(){
    clearUploadError();
    var text = document.getElementById('paste-input').value;
    if(!text.trim()){ showUploadError('Cole os dados (com o cabeçalho na primeira linha) antes de processar.'); return; }
    try{
      var rows = parseTSVText(text);
      processRows(rows);
    }catch(err){
      showUploadError('Não consegui interpretar esses dados. Confira se as colunas estão separadas por tabulação.');
    }
  });

  document.getElementById('btn-sample').addEventListener('click', function(){
    document.getElementById('paste-input').value = SAMPLE_TSV;
    clearUploadError();
    processRows(parseTSVText(SAMPLE_TSV));
  });

  function processRows(rows){
    var chamados = rowsToChamados(rows);
    if(!chamados.length){
      showUploadError('Nenhum chamado encontrado. Confira se a primeira linha é o cabeçalho e se há dados nas linhas seguintes.');
      return;
    }
    state.chamados = chamados;
    renderReview();
    showScreen('review');
  }

  var dateFrom = document.getElementById('date-from');
  var dateTo = document.getElementById('date-to');

  function getFilteredChamados(){
    var from = dateFrom.value ? new Date(dateFrom.value+'T00:00:00') : null;
    var to = dateTo.value ? new Date(dateTo.value+'T23:59:59') : null;
    return state.chamados.filter(function(c){
      if(!c._timestamp) return true;
      if(from && c._timestamp < from) return false;
      if(to && c._timestamp > to) return false;
      return true;
    });
  }

  function renderReview(){
    var wrap = document.getElementById('review-table-wrap');
    var filtered = getFilteredChamados();

    document.getElementById('filter-count').textContent =
      filtered.length + ' de ' + state.chamados.length + ' chamados';

    if(!filtered.length){
      wrap.innerHTML = '<div class="empty-state">Nenhum chamado no período selecionado.</div>';
      return;
    }

    var rowsHtml = filtered.map(function(c, i){
      return '<tr>' +
        '<td class="td-check"><input type="checkbox" class="row-check" data-idx="'+i+'" checked></td>' +
        '<td class="num">'+escapeHtml(val(c.numeroChamado))+'</td>' +
        '<td>'+escapeHtml(fmtDateTime(c._timestamp))+'</td>' +
        '<td>'+escapeHtml(val(c.equipe))+'</td>' +
        '<td>'+escapeHtml(val(c.anexo))+'</td>' +
        '<td>'+escapeHtml(val(c.nomeSetor))+'</td>' +
      '</tr>';
    }).join('');

    wrap.innerHTML =
      '<table class="chamados">' +
        '<thead><tr>' +
          '<th class="th-check"><input type="checkbox" id="check-all" checked></th>' +
          '<th>Nº chamado</th><th>Data</th><th>Equipe</th><th>Anexo</th><th>Setor</th>' +
        '</tr></thead>' +
        '<tbody>'+rowsHtml+'</tbody>' +
      '</table>';

    wrap._filtered = filtered;

    document.getElementById('check-all').addEventListener('change', function(e){
      wrap.querySelectorAll('.row-check').forEach(function(cb){ cb.checked = e.target.checked; });
    });
  }

  dateFrom.addEventListener('change', renderReview);
  dateTo.addEventListener('change', renderReview);
  document.getElementById('btn-clear-dates').addEventListener('click', function(){
    dateFrom.value = ''; dateTo.value = ''; renderReview();
  });
  document.getElementById('btn-back-upload').addEventListener('click', function(){
    showScreen('upload');
  });

  function statusText(v){
    var n = norm(v);
    if(n==='sim') return 'Sim';
    if(n==='não'||n==='nao') return 'Não';
    return val(v);
  }

  // "Equipe 5: José e Mateus" -> { num:'5', nomes:'José e Mateus' }
  // Avoids repeating the word "equipe" when the label already says it.
  function parseEquipe(v){
    var s = String(v||'').trim();
    var m = s.match(/^equipe\s*([^\s:]+)\s*:\s*(.+)$/i);
    if(m){ return { num:m[1].trim(), nomes:m[2].trim() }; }
    return { num:'', nomes: s || '' };
  }

  function buildOSPage(c, index, total){
    var chamadoNum = val(c.numeroChamado);
    var semOS = norm(c.numeroChamado).indexOf('sem os') !== -1 || norm(c.numeroChamado) === '—';
    var eq = parseEquipe(c.equipe);
    var equipeLabel = eq.num ? ('Equipe '+eq.num+':') : 'Equipe:';
    var equipeNomes = eq.nomes || val(c.equipe);

    var bandLabel = 'Manutenção de ar condicionado';
    if(val(c.nomeSetor) !== '—'){
      bandLabel += ' — ' + val(c.nomeSetor);
    }

    var dadosLocalizacao = '';
    if(norm(c.localizacao).indexOf('gabinete') !== -1){
      dadosLocalizacao = osItem('Nº do Gabinete', c.numGabinete) + osItem('Sala', c.sala);
    }else{
      dadosLocalizacao = osItem('Nome do Setor', c.nomeSetor) + osItem('Sala do Setor', c.salaSetor);
    }

    return (
    '<div class="os-page" id="os-'+index+'">' +
      '<div class="os-topline">' +
        '<div class="os-brand">' +
          '<img class="os-mark" src="'+LOGO_SRC+'" alt="ALECE">' +
          '<div class="os-brand-text">' +
            '<div class="org">Núcleo de Manutenção Predial</div>' +
            '<div class="dept">Assembleia Legislativa do Ceará</div>' +
          '</div>' +
        '</div>' +
        '<div class="os-title-block">' +
          '<div class="doc-type">Ordem de Serviço</div>' +
          '<div class="chamado-id">'+escapeHtml(chamadoNum)+'</div>' +
          (semOS ? '<div class="no-os">Sem número de OS atribuído</div>' : '') +
        '</div>' +
      '</div>' +

      '<div class="os-band">'+escapeHtml(bandLabel)+'</div>' +

      '<div class="os-meta">' +
        '<div>Data de fechamento: <b>'+escapeHtml(fmtDateTime(c._timestamp))+'</b></div>' +
        '<div>'+escapeHtml(equipeLabel)+' <b>'+escapeHtml(equipeNomes)+'</b></div>' +
      '</div>' +

      '<div class="os-section-title">Dados do Chamado</div>' +
      '<div class="os-grid">' +
        osItem('Anexo', c.anexo) +
        osItem('Localização', c.localizacao) +
        dadosLocalizacao +
      '</div>' +

      '<div class="os-section-title">Dados do Equipamento</div>' +
      '<div class="os-grid">' +
        osItem('Marca da Evaporadora', c.marcaEvap) +
        osItem('Capacidade', c.capacidade) +
        osItem('Tombo (placa alumínio / adesivo verde)', c.tombo) +
        osItem('Tag (adesivo branco com QR code)', c.tag) +
      '</div>' +

      '<div class="os-section-title">Diagnóstico</div>' +
      '<div class="os-grid">' +
        '<div class="os-item"><span class="lbl">Problema solucionado?</span><span class="val diag-plain">'+escapeHtml(statusText(c.solucionado))+'</span></div>' +
        '<div class="os-item"><span class="lbl">Água sanitária aplicada / filtros limpos?</span><span class="val diag-plain">'+escapeHtml(statusText(c.aguaSanitaria))+'</span></div>' +
        '<div class="os-item full"><span class="lbl">Descrição do problema</span><div class="os-desc-block">'+escapeHtml(val(c.descProblema))+'</div></div>' +
        (norm(c.pecaFaltando) && val(c.pecaFaltando) !== '—' ?
          '<div class="os-item full"><span class="lbl">Peça / problema pendente para solução</span><div class="os-desc-block">'+escapeHtml(val(c.pecaFaltando))+'</div></div>' : '') +
      '</div>' );
  }

  function osItem(label, value){
    return '<div class="os-item"><span class="lbl">'+escapeHtml(label)+'</span><span class="val">'+escapeHtml(val(value))+'</span></div>';
  }

  document.getElementById('btn-generate').addEventListener('click', function(){
    var wrap = document.getElementById('review-table-wrap');
    var filtered = wrap._filtered || [];
    var checks = wrap.querySelectorAll('.row-check');
    var selected = [];
    checks.forEach(function(cb){
      if(cb.checked) selected.push(filtered[parseInt(cb.dataset.idx,10)]);
    });
    if(!selected.length){ return; }

    var pagesHtml = selected.map(function(c,i){ return buildOSPage(c,i,selected.length); }).join('');
    document.getElementById('os-pages').innerHTML = pagesHtml;

    var navHtml = selected.map(function(c,i){
      return '<a href="#os-'+i+'">'+escapeHtml(val(c.numeroChamado))+'</a>';
    }).join('');
    document.getElementById('os-nav').innerHTML = navHtml;

    setHeaderStatus(selected.length + ' OS geradas');
    showScreen('os');
    window.scrollTo(0,0);
  });

  document.getElementById('btn-back-review').addEventListener('click', function(){
    showScreen('review');
  });
  document.getElementById('btn-print-all').addEventListener('click', function(){
    window.print();
  });

})();
</script>
</body>
</html>
